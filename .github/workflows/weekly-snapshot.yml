name: Weekly Orbitory snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  weekly-snapshot:
    name: Validate, crawl, and update snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate local data
        run: npm run validate:data

      - name: Run bounded crawler
        run: npm run crawl

      - name: Build app
        run: npm run build

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/snapshots/latest.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/latest.json
          git commit -m "chore: update Orbitory weekly snapshot"
          git push
