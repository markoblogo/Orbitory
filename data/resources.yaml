manualEdges:
  - from: abvx-home
    to: orbitory-public
    type: owned-by
    note: Orbitory is part of the ABVX ecosystem.
    evidence:
      - sourceUrl: https://abvx.xyz/systems
        targetUrl: https://orbitory.abvx.xyz/
        context: Systems catalogue references Orbitory as an ecosystem tool.
  - from: abvx-home
    to: github-markoblogo
    type: known
    note: ABVX work links to public source and development activity through the GitHub profile.
    evidence:
      - sourceUrl: https://abvx.xyz/systems
        targetUrl: https://github.com/markoblogo
        context: Repositories are treated as evidence under the GitHub profile resource.
      - sourceUrl: https://abvx.xyz/projects
        targetUrl: https://github.com/markoblogo
        context: Project references point back to the profile rather than individual repository nodes.
  - from: abvx-home
    to: medium-profile
    type: known
    note: ABVX writing points readers to a publication profile.
    evidence:
      - sourceUrl: https://abvx.xyz/writing
        targetUrl: https://medium.com/@markoblogo
        context: Individual articles are represented as context, not resources.
  - from: abvx-home
    to: substack-publication
    type: known
    note: Newsletter/publication activity is represented by the Substack profile.
    evidence:
      - sourceUrl: https://abvx.xyz/writing
        targetUrl: https://abvx.substack.com/
        context: Writing page references newsletter/publication destination.
  - from: abvx-home
    to: amazon-platform
    type: partner
    note: Books may link to Amazon as a platform destination.
    evidence:
      - sourceUrl: https://abvx.xyz/books
        targetUrl: https://www.amazon.com/
        context: Individual books are evidence for the Amazon platform relationship.
  - from: abvx-home
    to: linkedin-profile
    type: known
    note: Public professional profile.
    evidence:
      - sourceUrl: https://abvx.xyz/about
        targetUrl: https://www.linkedin.com/in/markoblogo/
        context: Profile/contact area.
  - from: abvx-home
    to: x-profile
    type: known
    note: Public social profile.
    evidence:
      - sourceUrl: https://abvx.xyz/about
        targetUrl: https://x.com/markoblogo
        context: Profile/contact area.
  - from: abvx-home
    to: bluesky-profile
    type: known
    note: Public social profile.
    evidence:
      - sourceUrl: https://abvx.xyz/about
        targetUrl: https://bsky.app/profile/markoblogo.bsky.social
        context: Profile/contact area.
  - from: github-markoblogo
    to: orbitory-public
    type: intended
    note: GitHub profile should surface the Orbitory destination once public.
    evidence:
      - sourceUrl: https://github.com/markoblogo
        targetUrl: https://orbitory.abvx.xyz/
        context: Intended profile link; individual repositories stay under the GitHub profile node.
